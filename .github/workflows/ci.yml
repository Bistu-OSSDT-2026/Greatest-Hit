name: Node.js 代码检查

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: JavaScript 语法检查
        run: |
          for f in $(find . -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*"); do
            node -c "$f" && echo "✅ $f"
          done
